      consumes:
      - application/json
      description: 通过文件ID和签名验证下载文件，支持多种传输方式（重定向、本地代理、多线程流）
      parameters:
      - description: 文件ID
        example: 123456
        in: path
        name: fileId
        required: true
        type: integer
      - description: 签名
        example: '"abc123"'
        in: query
        name: sign
        required: true
        type: string
      - description: UUID
        example: '"def456"'
        in: query
        name: uuid
        required: true
        type: string
      - description: 时间戳
        example: '"1234567890"'
        in: query
        name: timestamp
        required: true
        type: string
      - default: '"v1"'
        description: 签名版本
        example: '"v1"'
        in: query
        name: signer
        required: true
        type: string
      - description: HTTP Range 请求头，支持断点续传
        example: '"bytes=0-1023"'
        in: header
        name: Range
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: 文件下载成功（本地代理或多线程流模式）
          schema:
            type: file
        "302":
          description: 重定向到下载链接（重定向模式）
          schema:
            type: string
        "400":
          description: 创建多线程流请求失败，code=6014
          schema:
