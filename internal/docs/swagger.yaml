paths:
  /api/auto_ingest/log/list:
    get:
      consumes:
      - application/json
      description: 分页获取自动挂载日志，支持按计划ID与级别筛选
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - default: 1
        description: 当前页码，默认为1
        in: query
        name: currentPage
        type: integer
      - default: 10
        description: 每页大小，默认为10
        in: query
        name: pageSize
        type: integer
      - description: 计划ID
        in: query
        name: planId
        type: integer
      - description: 日志级别，如 info/error
        in: query
        name: level
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: 获取日志列表成功
          schema:
            allOf:
            - $ref: '#/definitions/httpcontext.Response'
            - properties:
                data:
                  $ref: '#/definitions/autoingest.logListResponse'
              type: object
        "400":
          description: 获取自动挂载日志列表失败，code=xxxx
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "401":
          description: 未授权访问
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/httpcontext.Response'
      summary: 获取自动挂载日志列表
      tags:
      - 自动挂载管理
  /api/auto_ingest/plan/create_subscribe:
    post:
      consumes:
      - application/json
      description: 创建订阅计划（占位实现，后续由你补充具体逻辑）
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 订阅计划参数（占位）
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/autoingest.createSubscribePlanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 创建成功
          schema:
            allOf:
            - $ref: '#/definitions/httpcontext.Response'
            - properties:
                data:
                  $ref: '#/definitions/autoingest.createSubscribePlanResponse'
              type: object
        "400":
          description: 参数验证失败，code=99998
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "401":
          description: 未授权访问
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/httpcontext.Response'
      summary: 创建订阅型自动挂载计划
      tags:
      - 自动挂载管理
  /api/auto_ingest/plan/delete:
    post:
      consumes:
      - application/json
      description: 根据计划ID删除自动挂载计划
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 计划ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/autoingest.deletePlanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "400":
          description: 删除自动挂载计划失败，code=xxxx
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "401":
          description: 未授权访问
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/httpcontext.Response'
      summary: 删除自动挂载计划
      tags:
      - 自动挂载管理
  /api/auto_ingest/plan/disable:
    post:
      consumes:
      - application/json
      description: 根据计划ID停用自动挂载计划
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: 计划ID
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/autoingest.disablePlanRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 停用成功
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "400":
          description: 停用自动挂载计划失败，code=xxxx
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "401":
          description: 未授权访问
          schema:
            $ref: '#/definitions/httpcontext.Response'
        "403":
          description: 权限不足
          schema:
            $ref: '#/definitions/httpcontext.Response'
      summary: 停用自动挂载计划
      tags:
      - 自动挂载管理
